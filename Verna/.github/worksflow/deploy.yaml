name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v3

    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa

    - name: Deploy
      run: |
        rsync -avz -e "ssh -o StrictHostKeyChecking=no" \
        ./ \
        ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:/var/www/html/Verna